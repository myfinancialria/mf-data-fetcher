name: 🏆 MF Complete Rankings — All Categories

on:
  schedule:
    - cron: "30 17 * * 1-5"   # 11:00 PM IST = 5:30 PM UTC, Mon–Fri
  workflow_dispatch:            # Run manually anytime from Actions tab

jobs:
  rank-all-funds:
    runs-on: ubuntu-latest
    timeout-minutes: 60         # Allow up to 60 minutes for all 200+ funds

    permissions:
      contents: write

    steps:

      - name: 📥 Checkout Repository
        uses: actions/checkout@v3

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 📦 Install Libraries
        run: |
          pip install requests pandas numpy openpyxl

      - name: 🚀 Run Complete MF Ranker
        run: python all_funds_ranker.py

      - name: 💾 Commit & Push Results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "🏆 MF Rankings Updated — $(date +'%d %b %Y')"
          git push
